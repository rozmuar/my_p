services:
  # Database for development
  postgres:
    image: postgres:15-alpine
    container_name: postapi-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postapi_dev}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data/pgdata
      - ./backend/sql:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - postapi-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postapi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: postapi-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - postapi-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API for development
  backend:
    build:
      context: ./backend
      target: development
    container_name: postapi-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-postapi_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-not-for-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PREFIX: api
      CORS_ORIGIN: "*"
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-4}
      LOG_LEVEL: debug
      FILE_UPLOAD_DEST: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_dev_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - postapi-dev-network

  # Frontend for development  
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: postapi-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_APP_NAME: ${VITE_APP_NAME:-PostAPI (Dev)}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-2.0.0-dev}
      VITE_ENVIRONMENT: development
      VITE_HMR_PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - postapi-dev-network

  # Database administration tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: postapi-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@postapi.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postapi-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  backend_dev_uploads:
    driver: local
  pgadmin_dev_data:
    driver: local

networks:
  postapi-dev-network:
    driver: bridge